<div class="d-flex container justify-content-center mt-4">
    <h1>NFL Teams</h1>
</div>
<div class="d-flex justify-content-center gap-4 mb-4 mt-4">
    <button class="btn btn-primary btn-xl" routerLink="/teams/conference/nfc">NFC</button>
    <button class="btn btn-dark btn-xl" routerLink="/teams">All Teams</button>
    <button class="btn btn-danger btn-xl" routerLink="/teams/conference/afc">AFC</button>
  </div>
<h2 class="text-center text-white mt-3">
  @if (!conference) {
    All Teams
  } @else if (conference === 'afc') {
    AFC Teams
  } @else {
    NFC Teams
  }
</h2>
<div class="container mb-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <input 
        type="text" 
        class="form-control form-control-lg" 
        placeholder="Search for a team (e.g. Vikings)..."
        (input)="onSearchChange($event)"
      >
    </div>
  </div>
</div>

<div class="container mt-4">
  <div class="row">
    @for (team of filteredTeams; track team.id) {
       <!-- Your existing card code remains exactly the same -->
       <div class="col-md-4 col-lg-3 mb-4">
         <div class="card h-100 text-center">
           <img [src]="team.logo" class="card-img-top p-3" [alt]="team.teamName || team.name">
           <div class="card-body">
             <h5 class="card-title">{{ team.teamName || team.name }}</h5>
             <p class="card-text text-muted">{{ team.division }}</p>
             <a class="btn btn-primary" [routerLink]="['/teams', team.id]">View Team</a>
           </div>
         </div>
       </div>
    } @empty {
      <div class="col-12 text-center text-white">
        <h3>No teams found matching "{{ searchTerm }}"</h3>
      </div>
    }
  </div>
</div>
